{% extends "base.html" %}
{% block title %}Log In — OA Summer Tennis Ladder{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-start justify-center pt-8 sm:pt-16 px-0">
<div class="w-full max-w-sm">

  <!-- Logo mark -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-green-700 shadow-lg mb-4">
      <span class="text-3xl">🎾</span>
    </div>
    <h1 class="text-2xl font-bold text-slate-900">Welcome back</h1>
    <p class="text-sm text-slate-500 mt-1">Sign in to your OA Summer Tennis Ladder account</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
    <form method="POST" action="{{ url_for('login') }}" class="p-6 space-y-5">

      <!-- Username -->
      <div class="space-y-1.5">
        <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">
          Username
        </label>
        <input id="username" name="username" type="text" autocomplete="username"
               value="{{ request.form.username or '' }}" required autofocus
               class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3
                      text-sm text-slate-900 placeholder:text-slate-300
                      focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition" />
      </div>

      <!-- Password -->
      <div class="space-y-1.5">
        <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">
          Password
        </label>
        <input id="password" name="password" type="password" autocomplete="current-password" required
               class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3
                      text-sm text-slate-900 placeholder:text-slate-300
                      focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition" />
      </div>

      <!-- Remember me -->
      <label class="flex items-center gap-2.5 cursor-pointer select-none">
        <input type="checkbox" name="remember" value="1"
               class="w-4 h-4 rounded border-slate-300 text-green-600 focus:ring-green-500" />
        <span class="text-sm text-slate-600">Keep me signed in</span>
      </label>

      <!-- Submit -->
      <button type="submit"
              class="w-full bg-green-700 hover:bg-green-600 active:bg-green-800 text-white font-semibold
                     text-sm py-3 rounded-xl shadow-sm transition-colors duration-150
                     focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">
        Sign In
      </button>

    </form>

    <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 text-center">
      <p class="text-sm text-slate-500">
        Don't have an account?
        <a href="{{ url_for('register') }}" class="text-green-700 font-semibold hover:underline">Register</a>
      </p>
    </div>
  </div>

</div>
</div>
{% endblock %}
