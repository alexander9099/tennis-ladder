services:
  - type: web
    name: tennis-ladder
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render generates a random value automatically
      - key: DATABASE_URL
        sync: false                # You paste this from Neon after creating the DB
      - key: ADMIN_PASSWORD
        sync: false                # Set to your own secure password
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: cron
    name: keep-alive
    runtime: python
    plan: free
    schedule: "*/10 * * * *"
    buildCommand: ""
    startCommand: python -c "import urllib.request; urllib.request.urlopen('https://tennis-ladder-g8hm.onrender.com/ping')"
